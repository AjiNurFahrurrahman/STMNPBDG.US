<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection - STMNPBDG.US</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .bg-custom-green {
        background-color: #263529;
      }
      .hover-line-menu {
        position: relative;
        display: inline-block;
        padding: 0.5rem 0;
      }
      .font-roboto {
        font-family: "Roboto", sans-serif;
      }
      .text-custom-gold {
        color: #b6a176;
      }
    </style>
  </head>
  <body
    class="bg-white m-0 p-0 h-screen overflow-hidden flex flex-col items-center justify-center relative"
  >
    <!-- SIDEBAR -->
    <div
      id="sidebar"
      class="fixed inset-y-0 left-0 w-64 bg-white z-[60] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl"
    >
      <div class="p-6">
        <button
          onclick="toggleMenu()"
          class="bg-custom-green text-custom-gold w-10 h-10 rounded flex items-center justify-center mb-12 hover:opacity-90 transition shadow-sm"
        >
          <i class="fas fa-bars text-xl"></i>
        </button>
        <ul
          class="flex flex-col gap-6 text-black font-extrabold tracking-wide text-sm md:text-base"
        >
          <li>
            <a href="shop.html" class="hover-line-menu group">
              SHOP
              <span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span>
            </a>
          </li>
          <li>
            <a href="collection.html" class="hover-line-menu group">
              COLLECTION
              <span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span>
            </a>
          </li>
          <li>
            <a href="lookbook.html" class="hover-line-menu group">
              LOOKBOOK
              <span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span>
            </a>
          </li>
          <li>
            <a href="about_us.html" class="hover-line-menu group">
              ABOUT US
              <span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <div
      id="overlay"
      onclick="toggleMenu()"
      class="fixed inset-0 bg-black/50 z-[55] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm"
    ></div>

    <!-- HEADER -->
    <nav
      class="fixed top-0 left-0 w-full z-50 bg-custom-green text-white px-4 py-4 md:px-8 flex justify-between items-center shadow-md"
    >
      <button
        onclick="toggleMenu()"
        class="text-xl md:text-2xl opacity-80 hover:opacity-100 transition"
      >
        <i class="fas fa-bars"></i>
      </button>
      <a
        href="../index.html"
        class="text-sm md:text-lg font-bold tracking-widest uppercase flex items-center gap-2 hover:opacity-80 transition"
        ><i class="fas fa-leaf text-xs opacity-80"></i> STMNPBDG.US</a
      >
      <div class="flex gap-4 md:gap-6 items-center">
        <button class="text-lg md:text-xl hover:opacity-100">
          <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="text-lg md:text-xl hover:opacity-100">
          <i class="fas fa-user-circle"></i>
        </button>
      </div>
    </nav>

    <!-- CONTENT -->
    <main
      class="w-full px-4 md:px-12 flex flex-col justify-center items-center h-full pt-20"
    >
      <div class="max-w-[1000px] w-full">
        <div class="text-center mb-6 md:mb-8">
          <h1
            class="text-2xl md:text-3xl font-extrabold tracking-widest uppercase text-black font-roboto"
          >
            COLLECTIONS
          </h1>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
          <!-- Q1 -->
          <div class="flex flex-col gap-2 group cursor-pointer">
            <div
              class="w-full aspect-[3/4] bg-gray-200 overflow-hidden relative shadow-sm"
            >
              <img
                src="https://placehold.co/600x800/e5e5e5/333333?text=Model+Q1"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <a
              href="#"
              class="block w-full py-2 bg-custom-green text-custom-gold font-roboto font-bold text-center text-sm md:text-base rounded shadow-md hover:bg-opacity-90 transition"
              >Q1</a
            >
          </div>
          <!-- Q2 -->
          <div class="flex flex-col gap-2 group cursor-pointer">
            <div
              class="w-full aspect-[3/4] bg-gray-200 overflow-hidden relative shadow-sm"
            >
              <img
                src="https://placehold.co/600x800/e5e5e5/333333?text=Model+Q2"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <a
              href="#"
              class="block w-full py-2 bg-custom-green text-custom-gold font-roboto font-bold text-center text-sm md:text-base rounded shadow-md hover:bg-opacity-90 transition"
              >Q2</a
            >
          </div>
          <!-- Q3 -->
          <div class="flex flex-col gap-2 group cursor-pointer">
            <div
              class="w-full aspect-[3/4] bg-gray-200 overflow-hidden relative shadow-sm"
            >
              <img
                src="https://placehold.co/600x800/e5e5e5/333333?text=Model+Q3"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <a
              href="#"
              class="block w-full py-2 bg-custom-green text-custom-gold font-roboto font-bold text-center text-sm md:text-base rounded shadow-md hover:bg-opacity-90 transition"
              >Q3</a
            >
          </div>
          <!-- Q4 -->
          <div class="flex flex-col gap-2 group cursor-pointer">
            <div
              class="w-full aspect-[3/4] bg-gray-200 overflow-hidden relative shadow-sm"
            >
              <img
                src="https://placehold.co/600x800/e5e5e5/333333?text=Model+Q4"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <a
              href="#"
              class="block w-full py-2 bg-custom-green text-custom-gold font-roboto font-bold text-center text-sm md:text-base rounded shadow-md hover:bg-opacity-90 transition"
              >Q4</a
            >
          </div>
        </div>
      </div>
    </main>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      function toggleMenu() {
        const isHidden = sidebar.classList.contains("-translate-x-full");
        if (isHidden) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.remove("hidden");
          setTimeout(() => {
            overlay.classList.remove("opacity-0");
          }, 10);
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("opacity-0");
          setTimeout(() => {
            overlay.classList.add("hidden");
          }, 300);
        }
      }
    </script>
  </body>
</html>
