<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - STMNPBDG.US</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      .bg-custom-green {
        background-color: #263529;
      }
      .text-custom-gold {
        color: #b6a176;
      }
      .bg-custom-gold {
        background-color: #b6a176;
      }
      .hover-line-menu {
        position: relative;
        display: inline-block;
        padding: 0.5rem 0;
      }
      .border-custom-gold {
        border-color: #b6a176;
      }

      /* Style Input Abu-abu (Konsisten dengan Guest Checkout) */
      .form-input {
        width: 100%;
        padding: 0.75rem;
        background-color: #e5e7eb; /* Gray-200 */
        border: none;
        border-radius: 0.375rem;
        outline: none;
        transition: background-color 0.3s;
      }
      .form-input:focus {
        background-color: #d1d5db; /* Gray-300 */
        box-shadow: 0 0 0 1px #263529;
      }
    </style>
  </head>
  <body
    class="bg-white m-0 p-0 min-h-screen flex flex-col font-sans text-gray-900"
  >
    <!-- SIDEBAR MENU -->
    <div
      id="sidebar"
      class="fixed inset-y-0 left-0 w-64 bg-white z-[60] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl"
    >
      <div class="p-6">
        <button
          onclick="toggleMenu()"
          class="bg-custom-green text-custom-gold w-10 h-10 rounded flex items-center justify-center mb-12 hover:opacity-90 transition shadow-sm"
        >
          <i class="fas fa-bars text-xl"></i>
        </button>
        <ul
          class="flex flex-col gap-6 text-black font-extrabold tracking-wide text-sm md:text-base"
        >
          <li>
            <a href="../menu/shop.html" class="hover-line-menu group"
              >SHOP<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="../menu/collection.html" class="hover-line-menu group"
              >COLLECTION<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="../menu/lookbook.html" class="hover-line-menu group"
              >LOOKBOOK<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="../menu/about_us.html" class="hover-line-menu group"
              >ABOUT US<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
        </ul>
      </div>
    </div>
    <div
      id="overlay"
      onclick="toggleMenu()"
      class="fixed inset-0 bg-black/50 z-[55] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm"
    ></div>

    <!-- HEADER -->
    <nav
      class="w-full z-50 bg-custom-green text-white px-4 py-4 md:px-8 flex justify-between items-center shadow-md flex-none h-16 md:h-20"
    >
      <button
        onclick="toggleMenu()"
        class="text-xl md:text-2xl opacity-80 hover:opacity-100 transition focus:outline-none"
      >
        <i class="fas fa-bars"></i>
      </button>
      <a
        href="../index.html"
        class="text-sm md:text-lg font-bold tracking-widest uppercase flex items-center gap-2 hover:opacity-80 transition cursor-pointer"
        ><i class="fas fa-leaf text-xs opacity-80"></i> STMNPBDG.US</a
      >
      <div class="flex gap-4 md:gap-6 items-center">
        <button
          class="text-lg md:text-xl opacity-80 hover:opacity-100 transition"
        >
          <i class="fas fa-shopping-cart"></i>
        </button>
        <a
          href="login.html"
          class="text-lg md:text-xl opacity-80 hover:opacity-100 transition text-custom-gold"
          ><i class="fas fa-user-circle"></i
        ></a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main
      class="w-full px-6 md:px-16 py-12 flex-grow flex flex-col items-center"
    >
      <div class="max-w-[1000px] w-full relative">
        <!-- Tombol Kembali -->
        <a
          href="login.html"
          class="absolute top-1 left-0 text-2xl text-black hover:opacity-70 transition"
        >
          <i class="fas fa-arrow-left"></i>
        </a>

        <!-- Judul -->
        <h1
          class="text-3xl md:text-4xl font-extrabold mb-10 text-black tracking-wide text-center"
        >
          Create Account
        </h1>

        <!-- FORM -->
        <form class="w-full">
          <!-- Grid Layout untuk kerapian -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
            <!-- Nama Lengkap (Full Width di Mobile, Kiri di Desktop) -->
            <div class="flex flex-col gap-2">
              <label for="nama" class="text-sm font-medium text-black"
                >Nama Lengkap</label
              >
              <input type="text" id="nama" class="form-input" />
            </div>

            <!-- No HP -->
            <div class="flex flex-col gap-2">
              <label for="phone" class="text-sm font-medium text-black"
                >No. Handphone</label
              >
              <input type="tel" id="phone" class="form-input" />
            </div>

            <!-- Email (Full Width di Desktop untuk estetik, atau bisa masuk grid) -->
            <div class="flex flex-col gap-2 md:col-span-2">
              <label for="email" class="text-sm font-medium text-black"
                >Alamat Email</label
              >
              <input type="email" id="email" class="form-input" />
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-2">
              <label for="password" class="text-sm font-medium text-black"
                >Kata Sandi</label
              >
              <div class="relative">
                <input type="password" id="password" class="form-input pr-10" />
                <button
                  type="button"
                  class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-black"
                >
                  <i class="far fa-eye"></i>
                </button>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="flex flex-col gap-2">
              <label
                for="confirm_password"
                class="text-sm font-medium text-black"
                >Konfirmasi Kata Sandi</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="confirm_password"
                  class="form-input pr-10"
                />
                <button
                  type="button"
                  class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-black"
                >
                  <i class="far fa-eye"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Terms Checkbox -->
          <div class="mt-8 flex items-center gap-2">
            <input
              type="checkbox"
              id="terms"
              class="w-4 h-4 text-green-900 border-gray-300 rounded focus:ring-green-900"
            />
            <label for="terms" class="text-xs md:text-sm text-gray-600">
              Saya menyetujui
              <a href="#" class="underline hover:text-black"
                >Syarat & Ketentuan</a
              >
              serta
              <a href="#" class="underline hover:text-black"
                >Kebijakan Privasi</a
              >.
            </label>
          </div>

          <!-- Tombol Submit -->
          <div class="flex justify-end mt-8">
            <button
              type="submit"
              class="bg-custom-green text-white font-medium py-3 px-12 rounded-lg hover:opacity-90 transition shadow-lg text-lg"
            >
              <a href="#" class="underline hover:text-black">sign up</a>.
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      function toggleMenu() {
        const isHidden = sidebar.classList.contains("-translate-x-full");
        if (isHidden) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.remove("hidden");
          setTimeout(() => {
            overlay.classList.remove("opacity-0");
          }, 10);
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("opacity-0");
          setTimeout(() => {
            overlay.classList.add("hidden");
          }, 300);
        }
      }
    </script>
  </body>
</html>
