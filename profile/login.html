<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - STMNPBDG.US</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      .bg-custom-green {
        background-color: #263529;
      }
      .text-custom-gold {
        color: #b6a176;
      }
      .bg-custom-gold {
        background-color: #b6a176;
      }
      .hover-line-menu {
        position: relative;
        display: inline-block;
        padding: 0.5rem 0;
      }
      .border-custom-gold {
        border-color: #b6a176;
      }
      .form-input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.375rem;
        outline: none;
        transition: border-color 0.3s;
      }
      .form-input:focus {
        border-color: #263529;
        box-shadow: 0 0 0 1px #263529;
      }
    </style>
  </head>
  <body
    class="bg-white m-0 p-0 h-screen overflow-hidden flex flex-col font-sans text-gray-900"
  >
    <!-- SIDEBAR -->
    <div
      id="sidebar"
      class="fixed inset-y-0 left-0 w-64 bg-white z-[60] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl"
    >
      <div class="p-6">
        <button
          onclick="toggleMenu()"
          class="bg-custom-green text-custom-gold w-10 h-10 rounded flex items-center justify-center mb-12 hover:opacity-90 transition shadow-sm"
        >
          <i class="fas fa-bars text-xl"></i>
        </button>
        <ul
          class="flex flex-col gap-6 text-black font-extrabold tracking-wide text-sm md:text-base"
        >
          <li>
            <a href="/menu/shop.html" class="hover-line-menu group"
              >SHOP<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="/menu/collection.html" class="hover-line-menu group"
              >COLLECTION<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="/menu/lookbook.html" class="hover-line-menu group"
              >LOOKBOOK<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
          <li>
            <a href="/menu/about_us.html" class="hover-line-menu group"
              >ABOUT US<span
                class="absolute bottom-0 left-0 w-full h-[2px] bg-black scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-center"
              ></span
            ></a>
          </li>
        </ul>
      </div>
    </div>
    <div
      id="overlay"
      onclick="toggleMenu()"
      class="fixed inset-0 bg-black/50 z-[55] hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm"
    ></div>

    <!-- HEADER -->
    <nav
      class="w-full z-50 bg-custom-green text-white px-4 py-4 md:px-8 flex justify-between items-center shadow-md flex-none h-16 md:h-20"
    >
      <button
        onclick="toggleMenu()"
        class="text-xl md:text-2xl opacity-80 hover:opacity-100 transition focus:outline-none"
      >
        <i class="fas fa-bars"></i>
      </button>

      <!-- LOGO LINK KE HALAMAN UTAMA (index.html) -->
      <a
        href="/index.html"
        class="text-sm md:text-lg font-bold tracking-widest uppercase flex items-center gap-2 hover:opacity-80 transition cursor-pointer"
      >
        <i class="fas fa-leaf text-xs opacity-80"></i> STMNPBDG.US
      </a>

      <div class="flex gap-4 md:gap-6 items-center">
        <button
          class="text-lg md:text-xl opacity-80 hover:opacity-100 transition"
        >
          <i class="fas fa-shopping-cart"></i>
        </button>
        <a
          href="login.html"
          class="text-lg md:text-xl text-custom-gold hover:opacity-100 transition"
          ><i class="fas fa-user-circle"></i
        ></a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main
      class="w-full px-6 md:px-16 flex-grow flex flex-col justify-center items-center h-full"
    >
      <div class="max-w-[900px] w-full">
        <h1
          class="text-3xl md:text-4xl font-extrabold mb-10 text-black tracking-wide"
        >
          Masuk
        </h1>
        <div
          class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-24 items-center"
        >
          <form class="flex flex-col gap-5 w-full">
            <div class="flex flex-col gap-2">
              <label for="email" class="text-sm font-medium text-gray-700"
                >Alamat Email</label
              >
              <input
                type="email"
                id="email"
                placeholder="Email"
                class="form-input text-sm"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label for="password" class="text-sm font-medium text-gray-700"
                >Kata Sandi</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  placeholder="Password"
                  class="form-input pr-10 text-sm"
                />
                <button
                  type="button"
                  class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
                >
                  <i class="far fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="flex flex-col gap-6 mt-1">
              <a
                href="#"
                class="text-xs text-gray-600 hover:text-black hover:underline transition"
                >Lupa Kata Sandi?</a
              >
              <button
                type="submit"
                class="w-full md:w-auto bg-custom-gold text-white md:text-black font-bold py-3 px-8 rounded-md hover:bg-opacity-90 transition shadow-sm uppercase tracking-wider text-xs md:text-sm"
              >
                Masuk
              </button>
            </div>
          </form>
          <div
            class="flex flex-col gap-4 w-full border-t md:border-t-0 md:border-l border-gray-200 pt-8 md:pt-0 md:pl-12"
          >
            <p class="text-sm text-gray-500 mb-2 md:hidden">Atau</p>
            <a
              href="#"
              class="w-full block border border-black text-black text-center font-medium py-3 rounded hover:bg-black hover:text-white transition duration-300 text-sm uppercase tracking-wide"
              >Create Account</a
            >
            <a
              href="/profile/guest_checkout.html"
              class="w-full block border border-black text-black text-center font-medium py-3 rounded hover:bg-black hover:text-white transition duration-300 text-sm uppercase tracking-wide"
              >Guest Account</a
            >
          </div>
        </div>
      </div>
    </main>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      function toggleMenu() {
        const isHidden = sidebar.classList.contains("-translate-x-full");
        if (isHidden) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.remove("hidden");
          setTimeout(() => {
            overlay.classList.remove("opacity-0");
          }, 10);
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("opacity-0");
          setTimeout(() => {
            overlay.classList.add("hidden");
          }, 300);
        }
      }
    </script>
  </body>
</html>
